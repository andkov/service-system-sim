default:
  project_name: "service-system-sim"
  
  # AI Support Configuration
  ai_support:
    personas_dir: "./ai/personas/"
    memory_dir: "./ai/memory/"
    default_persona: "default"
    context_components:
      - "mission"
      - "method"
      - "glossary"
    memory_enabled: true
  
  # Simulation Configuration
  simulation:
    time_start: "2015-01-01"    # First pay_period
    time_end: "2024-12-01"      # Last pay_period (120 months)
    n_persons: 500              # Number of random persons to generate
    random_seed: 20260317       # Reproducibility seed
    demo_persons_file: "./data-public/raw/fictional/demo-persons.csv"
  
  # Pipeline Database Configuration (3 SQLite DBs by analytical grain)
  pipeline:
    db_dir: "./data-private/derived/pipeline/"
    payment_db: "./data-private/derived/pipeline/payment.sqlite"
    episode_db: "./data-private/derived/pipeline/episode.sqlite"
    timeseries_db: "./data-private/derived/pipeline/timeseries.sqlite"
    export_dir: "./data-private/derived/export/"

  # Basic project configuration
  directories:
    ai: "./ai/"
    data_private: "./data-private/"
    data_public: "./data-public/"
    analysis: "./analysis/"
    derived: "./data-private/derived/"
    raw: "./data-private/raw/"
